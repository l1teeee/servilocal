<svg class="logo-mark" viewBox="0 0 68 68" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- Amber node: provider -->
    <circle cx="50" cy="16" r="9" fill="#F2A22A" opacity="0.15"/>
    <circle cx="50" cy="16" r="6" fill="#F2A22A"/>
    <!-- Coral node: client -->
    <circle cx="18" cy="52" r="9" fill="#E05A38" opacity="0.15"/>
    <circle cx="18" cy="52" r="6" fill="#E05A38"/>
    <!-- S-curve path -->
    <path d="M50 22 C50 34, 34 34, 34 34 C34 34, 18 34, 18 46"
          stroke="url(#pathgrad)" stroke-width="2.5" fill="none"
          stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Mid node -->
    <circle cx="34" cy="34" r="3" fill="#F4F3EE" opacity="0.5"/>
    <defs>
        <linearGradient id="pathgrad" x1="50" y1="22" x2="18" y2="46" gradientUnits="userSpaceOnUse">
            <stop stop-color="#F2A22A"/>
            <stop offset="1" stop-color="#E05A38"/>
        </linearGradient>
    </defs>
</svg>
